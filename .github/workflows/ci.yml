name: Arena Guard (CI)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify-strength:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./pokemon-arena

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './pokemon-arena/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run Tests (Vitest)
        run: npm run test

      - name: Build Project
        run: npm run build